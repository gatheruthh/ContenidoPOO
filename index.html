<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning POO Premium | UTHH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --uthh-green: #006341;
            --uthh-light-green: #008a5b;
            --uthh-gold: #c5b358;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
        }
        body {
            background-color: #050505;
            color: #f3f4f6;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .sidebar-item {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        .sidebar-active {
            background: linear-gradient(90deg, rgba(0, 99, 65, 0.2) 0%, transparent 100%);
            color: var(--uthh-gold);
            border-left-color: var(--uthh-gold);
            font-weight: 700;
        }
        .glass-header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .page-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            margin-bottom: 80px;
            overflow: hidden;
            width: 800px; /* Ancho fijo para mantener consistencia de hoja */
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            /* Eliminamos min-height fijo para que se adapte a la imagen */
            display: flex;
            flex-direction: column;
        }
        .summary-badge {
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .page-img {
            width: 100%;
            height: auto; /* La altura se ajusta proporcionalmente a la diapositiva */
            display: block;
            object-fit: contain; 
            background: #fff;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .badge-number {
            background: var(--uthh-green);
            color: white;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 10px;
        }

        /* Estilos específicos para la Portada Generada por Código */
        .portada-container {
            min-height: 1100px; /* La portada mantiene su tamaño elegante */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            color: #111;
            position: relative;
            background: radial-gradient(circle at top right, #f8fafc, #ffffff);
        }
        .portada-decoration {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: var(--uthh-green);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
            opacity: 0.05;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Header Superior -->
    <header class="h-20 glass-header flex items-center justify-between px-8 shrink-0 z-50">
        <div class="flex items-center gap-6">
            <img src="img/logo_uthh.png" alt="UTHH" class="h-12 object-contain" onerror="this.src='https://www.uthh.edu.mx/images/logo_uthh.png'; this.classList.add('brightness-0', 'invert');">

            <div class="hidden lg:block">
                <h1 class="text-lg font-extrabold tracking-tight text-white">Programación Orientada a Objetos</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-uthh-gold font-bold">Portal de Aprendizaje Avanzado</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block mr-4">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Catedrático</p>
                <p class="text-sm font-semibold">Ing. Gadiel Ramos Hernández</p>
            </div>
            <div class="bg-white/5 p-2 px-4 rounded-xl border border-white/10 flex items-center gap-3">
                <i class="fas fa-file-alt text-uthh-gold"></i>
                <span class="text-xs font-bold uppercase tracking-widest">34 Hojas</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <!-- Sidebar de Navegación Lateral -->
        <aside class="w-80 bg-[#0a0a0a] border-r border-white/5 overflow-y-auto no-scrollbar hidden md:block">
            <div class="p-6 text-[10px] font-black text-gray-400 uppercase tracking-widest border-b border-white/5">
                Índice de Temas
            </div>
            <nav id="sidebar-nav" class="py-4">
                <!-- Generado por JS -->
            </nav>
        </aside>

        <!-- Área de Visualización -->
        <main id="viewer" class="flex-1 overflow-y-auto p-6 md:p-16 no-scrollbar scroll-smooth bg-[#0f0f0f]">
            <div class="max-w-screen-xl mx-auto" id="pages-content">
                <!-- Generado por JS -->
            </div>
        </main>

    </div>

    <script>
        const totalPages = 34;
        const sidebar = document.getElementById('sidebar-nav');
        const content = document.getElementById('pages-content');
        const viewer = document.getElementById('viewer');

        const contentData = {
            1: { title: "Presentación", desc: "Información institucional y docente.", color: "bg-green-900/30" },
            2: { title: "Temas", desc: "Desglose de contenidos y dimensiones del saber.", color: "bg-green-900/30" },
            3: { title: "Evolución de los lenguajes", desc: "Historia y desarrollo de la programación.", color: "bg-blue-900/30" },
            4: { title: "Paradigmas de programación", desc: "Clasificación de las formas de programar.", color: "bg-blue-900/30" },
            5: { title: "Ejemplo de paradigma Estructurado", desc: "Lógica secuencial y control de flujo.", color: "bg-indigo-900/30" },
            6: { title: "Ejemplo de paradigma Estructurado", desc: "Profundización en programación procedimental.", color: "bg-indigo-900/30" },
            7: { title: "Paradigma orientado a objetos", desc: "Fundamentos y filosofía del modelo POO.", color: "bg-purple-900/30" },
            8: { title: "Clases, objetos, atributos, métodos", desc: "Los 4 elementos base de la construcción POO.", color: "bg-purple-900/30" },
            9: { title: "Instancias y Constructor", desc: "El nacimiento de los objetos y su inicialización.", color: "bg-purple-900/30" },
            10: { title: "Ejemplo 1 de Clases y Objetos", desc: "Modelado práctico de entidades del mundo real.", color: "bg-yellow-900/30" },
            11: { title: "Ejemplo 1 de Clases y Objetos", desc: "Análisis y representación técnica.", color: "bg-yellow-900/30" },
            12: { title: "Ejemplo 2 de Clases y Objetos", desc: "Definición de estados y comportamientos.", color: "bg-yellow-900/30" },
            13: { title: "Ejemplo 2 de Clases y Objetos", desc: "Interacción entre atributos y métodos.", color: "bg-yellow-900/30" },
            14: { title: "Ejemplo 3 de Clases y Objetos", desc: "Uso de parámetros y retorno de datos.", color: "bg-yellow-900/30" },
            15: { title: "Ejemplo 3 de Clases y Objetos", desc: "Optimización del código del objeto.", color: "bg-yellow-900/30" },
            16: { title: "Ejemplo 4 de Clases y Objetos", desc: "Estructuras complejas de datos.", color: "bg-yellow-900/30" },
            17: { title: "Ejemplo 4 de Clases y Objetos", desc: "Casos de uso avanzados.", color: "bg-yellow-900/30" },
            18: { title: "Ejemplo 5 de Clases y Objetos", desc: "Validación de lógica interna.", color: "bg-yellow-900/30" },
            19: { title: "Ejemplo 6 de Clases y Objetos", desc: "Implementación de clases personalizadas.", color: "bg-yellow-900/30" },
            20: { title: "Ejemplo 6 de Clases y Objetos", desc: "Análisis final de modelado.", color: "bg-yellow-900/30" },
            21: { title: "Los pilares de la POO", desc: "Resumen de los fundamentos: Abstracción, Encapsulamiento, Herencia y Polimorfismo.", color: "bg-orange-900/30" },
            22: { title: "Abstracción", desc: "Identificar lo esencial eliminando lo innecesario.", color: "bg-orange-900/30" },
            23: { title: "Encapsulamiento", desc: "Protección de datos mediante modificadores de acceso.", color: "bg-red-900/30" },
            24: { title: "Encapsulamiento - continúa", desc: "Uso de Getters y Setters para seguridad.", color: "bg-red-900/30" },
            25: { title: "Herencia", desc: "Reutilización de código mediante jerarquías.", color: "bg-cyan-900/30" },
            26: { title: "Herencia - continúa", desc: "Relación Superclase y Subclase.", color: "bg-cyan-900/30" },
            27: { title: "Herencia - ejemplo", desc: "Especialización de clases.", color: "bg-cyan-900/30" },
            28: { title: "Herencia - ejemplo", desc: "Atributos protegidos y constructores hijos.", color: "bg-cyan-900/30" },
            29: { title: "Herencia - ejemplo", desc: "Extensión de funcionalidades.", color: "bg-cyan-900/30" },
            30: { title: "Polimorfismo", desc: "Capacidad de actuar de diferentes formas ante el mismo mensaje.", color: "bg-pink-900/30" },
            31: { title: "Polimorfismo - ejemplo", desc: "Sobreescritura de métodos (Override).", color: "bg-pink-900/30" },
            32: { title: "Polimorfismo - ejemplo", desc: "Comportamientos dinámicos en ejecución.", color: "bg-pink-900/30" },
            33: { title: "Polimorfismo - ejemplo", desc: "Relación entre clases hermanas.", color: "bg-pink-900/30" },
            34: { title: "Polimorfismo - ejemplo práctico", desc: "Aplicación final en lógica de negocio.", color: "bg-pink-900/30" }
        };

        for (let i = 1; i <= totalPages; i++) {
            const data = contentData[i] || { title: `Página ${i}`, desc: "Contenido del curso.", color: "bg-gray-800" };

            // Sidebar Item
            const link = document.createElement('a');
            link.href = `#hoja-${i}`;
            link.id = `nav-hoja-${i}`;
            link.className = `sidebar-item flex flex-col px-6 py-4 border-b border-white/5 cursor-pointer hover:bg-white/5`;
            link.innerHTML = `
                <div class="flex items-center mb-1">
                    <span class="badge-number">${i}</span>
                    <span class="text-[11px] uppercase font-bold tracking-wider">${data.title}</span>
                </div>
                <span class="text-[9px] text-gray-500 font-medium pl-8">${data.desc}</span>
            `;
            link.onclick = (e) => {
                e.preventDefault();
                document.getElementById(`hoja-${i}`).scrollIntoView({ behavior: 'smooth' });
                updateActiveLink(i);
            };
            sidebar.appendChild(link);

            // Contenido Page
            const container = document.createElement('div');
            container.id = `hoja-${i}`;
            container.className = "mb-32 flex flex-col items-center";
            
            let innerHTML = `
                <div class="summary-badge ${data.color} w-full max-w-4xl flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h2 class="text-xl font-extrabold text-white uppercase tracking-tight">${data.title}</h2>
                        <p class="text-sm text-gray-300 opacity-80">${data.desc}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-black text-uthh-gold uppercase tracking-widest">Hoja ${i}</span>
                    </div>
                </div>
            `;

            if (i === 1) {
                // GENERACIÓN DE PORTADA POR CÓDIGO
                innerHTML += `
                <div class="page-card">
                    <div class="portada-container">
                        <div class="portada-decoration"></div>
                        
                        <!-- Top Header -->
                        <div class="flex justify-between items-start border-b-2 border-gray-100 pb-8 relative">
                            <img src="https://www.uthh.edu.mx/images/logo_uthh.png" class="h-20 object-contain">
                            <div class="text-right">
                                <h4 class="font-black text-gray-400 text-[10px] uppercase tracking-widest mb-1">Institución</h4>
                                <p class="font-bold text-sm text-[#006341]">Universidad Tecnológica de la<br>Huasteca Hidalguense</p>
                            </div>
                        </div>

                        <!-- Main Title -->
                        <div class="flex-1 flex flex-col justify-center py-12">
                            <span class="text-[#c5b358] font-black text-xs uppercase tracking-[0.4em] mb-4">Material Didáctico de Especialidad</span>
                            <h1 class="text-6xl font-black text-gray-900 leading-[1.1] mb-6">
                                PROGRAMACIÓN <br>
                                <span class="text-[#006341]">ORIENTADA A</span> <br>
                                OBJETOS
                            </h1>
                            <div class="w-32 h-2 bg-[#c5b358] mb-8"></div>
                            <h2 class="text-2xl font-bold text-gray-500 tracking-tight uppercase">
                                Desarrollo de Software Multiplataforma
                            </h2>
                        </div>

                        <!-- Teacher Info Card -->
                        <div class="bg-gray-50 rounded-3xl p-8 border border-gray-100 flex items-center gap-8 shadow-sm">
                            <div class="w-24 h-24 bg-[#006341] rounded-2xl flex items-center justify-center text-white text-4xl">
                                <i class="fas fa-laptop-code"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-[#c5b358] uppercase tracking-widest mb-1">Docente Titular</p>
                                <h3 class="text-2xl font-black text-gray-800">Ing. Gadiel Ramos Hernández</h3>
                                <p class="text-sm font-bold text-gray-500 mb-3 underline decoration-[#c5b358]">gadiel.ramos@uthh.edu.mx</p>
                                
                                <div class="flex flex-wrap gap-2 mt-4">
                                    <span class="bg-white border border-gray-200 text-[9px] font-black text-[#006341] px-3 py-1 rounded-full uppercase tracking-wider shadow-sm">Móvil</span>
                                    <span class="bg-white border border-gray-200 text-[9px] font-black text-[#006341] px-3 py-1 rounded-full uppercase tracking-wider shadow-sm">Web</span>
                                    <span class="bg-white border border-gray-200 text-[9px] font-black text-[#006341] px-3 py-1 rounded-full uppercase tracking-wider shadow-sm">Escritorio</span>
                                    <span class="bg-white border border-gray-200 text-[9px] font-black text-[#006341] px-3 py-1 rounded-full uppercase tracking-wider shadow-sm">Bases de Datos</span>
                                    <span class="bg-[#006341] text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-wider shadow-sm">IA Implementation</span>
                                </div>
                            </div>
                        </div>

                        <!-- Footer Portada -->
                        <div class="mt-12 flex justify-between items-end border-t border-gray-100 pt-8">
                            <div class="text-[9px] font-bold text-gray-400 uppercase leading-loose">
                                <p>Huejutla de Reyes, Hidalgo</p>
                                <p>División de Tecnologías de la Información</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[40px] font-black text-gray-100 leading-none">2024</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else {
                // RESTO DE PÁGINAS (EL CONTENEDOR SE ADAPTA A LA PROPORCIÓN DE LA DIAPOSITIVA)
                innerHTML += `
                <div class="page-card">
                    <img src="img/hoja${i}.jpg" alt="${data.title}" class="page-img" 
                         onerror="this.src='https://via.placeholder.com/800x450/ffffff/333333?text=HOJA+${i}+-+DIAPOSITIVA\\n\\n(Cargar+hoja${i}.jpg+en+carpeta+img/)'">
                </div>`;
            }

            container.innerHTML = innerHTML;
            content.appendChild(container);
        }

        function updateActiveLink(index) {
            document.querySelectorAll('.sidebar-item').forEach((item, i) => {
                if (i === index - 1) item.classList.add('sidebar-active');
                else item.classList.remove('sidebar-active');
            });
        }

        let isScrolling;
        viewer.addEventListener('scroll', () => {
            window.clearTimeout(isScrolling);
            isScrolling = setTimeout(() => {
                const pages = document.querySelectorAll('[id^="hoja-"]');
                pages.forEach((page, i) => {
                    const rect = page.getBoundingClientRect();
                    if (rect.top >= -200 && rect.top <= 400) {
                        updateActiveLink(i + 1);
                    }
                });
            }, 100);
        });

        updateActiveLink(1);
    </script>
</body>
</html>
